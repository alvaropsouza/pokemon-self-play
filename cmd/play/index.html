<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>pokemon-self-play</title>
<style>
  :root { --bg:#0d1420; --panel:#16202f; --line:#2a3a52; --txt:#dbe6f5; --dim:#7d92ad; --accent:#f5b942; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt); font:14px/1.4 system-ui,sans-serif; }
  #app { display:grid; grid-template-columns:1fr 320px; gap:12px; padding:12px; max-width:1400px; margin:auto; }
  .table { display:flex; flex-direction:column; gap:8px; }
  .side { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:10px; }
  .side h3 { margin:0 0 6px; font-size:13px; color:var(--dim); text-transform:uppercase; letter-spacing:.5px; }
  .zones { display:flex; gap:14px; align-items:flex-start; flex-wrap:wrap; }
  .zone { text-align:center; }
  .zone .label { font-size:11px; color:var(--dim); margin-top:3px; }
  .card { width:84px; border-radius:5px; display:block; }
  .cardbox { position:relative; display:inline-block; cursor:pointer; }
  .cardbox.sel { outline:3px solid var(--accent); border-radius:6px; }
  .dmg { position:absolute; top:2px; right:2px; background:#c0392b; color:#fff; border-radius:9px; padding:1px 6px; font-size:11px; font-weight:700; }
  .cond { position:absolute; bottom:2px; left:2px; right:2px; font-size:10px; background:rgba(0,0,0,.7); border-radius:4px; padding:1px 2px; }
  .energy { width:20px; height:20px; border-radius:50%; margin:1px; }
  .pile { width:60px; height:84px; border:1px dashed var(--line); border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:18px; color:var(--dim); }
  .hand { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
  .hand .card { width:96px; }
  #sidebar { display:flex; flex-direction:column; gap:10px; }
  .panel { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:10px; }
  #status { font-weight:600; }
  #status .err { color:#ff7b6b; font-weight:400; display:block; margin-top:4px; }
  #actions button, .panel button { background:#223td4; background:#22334d; color:var(--txt); border:1px solid var(--line); border-radius:6px; padding:6px 10px; margin:2px; cursor:pointer; font-size:13px; }
  #actions button:hover, .panel button:hover { border-color:var(--accent); }
  #actions button.primary { background:var(--accent); color:#1a1a1a; font-weight:700; }
  #log { height:260px; overflow-y:auto; font-size:12px; color:var(--dim); }
  #log div { padding:1px 0; border-bottom:1px solid #1c2838; }
  details summary { cursor:pointer; color:var(--dim); }
  .arb input, .arb select { background:#0d1420; color:var(--txt); border:1px solid var(--line); border-radius:5px; padding:4px; width:70px; margin:2px; }
  .winner { font-size:20px; color:var(--accent); text-align:center; padding:14px; }
</style>
</head>
<body>
<div id="app">
  <div class="table">
    <div class="side" id="botSide"></div>
    <div class="side" id="youSide"></div>
    <div class="side"><h3>Sua mão</h3><div class="hand" id="hand"></div></div>
  </div>
  <div id="sidebar">
    <div class="panel" id="status"></div>
    <div class="panel" id="actions"></div>
    <div class="panel"><h3 style="margin:0 0 6px;font-size:13px;color:var(--dim)">LOG</h3><div id="log"></div></div>
    <div class="panel arb"><details><summary>Arbitragem manual (efeitos de carta)</summary>
      <div style="margin-top:6px">
        Lado: <select id="arbP"><option value="0">você</option><option value="1">bot</option></select>
        Alvo: <select id="arbSlot"><option value="-1">Ativo</option><option value="0">Banco 1</option><option value="1">Banco 2</option><option value="2">Banco 3</option><option value="3">Banco 4</option><option value="4">Banco 5</option></select>
        <input id="arbAmt" type="number" value="10" step="10">
        <div>
          <button onclick="arb('arb_damage')">Dano</button>
          <button onclick="arb('arb_heal')">Cura</button>
          <button onclick="arb('arb_draw')">Comprar N</button>
          <button onclick="arb('arb_switch')">Trocar Ativo</button>
          <button onclick="arb('arb_shuffle')">Embaralhar</button>
        </div>
        <div>
          <select id="arbCond"><option>poisoned</option><option>burned</option><option>asleep</option><option>confused</option><option>paralyzed</option></select>
          <button onclick="arbCondition()">Aplicar condição</button>
        </div>
      </div>
    </details></div>
  </div>
</div>
<script>
let S = null;          // último estado
let sel = null;        // {kind:'hand'|'active'|'bench', idx}
let lastErr = '';

async function post(body) {
  const r = await fetch('/api/action', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
  const j = await r.json();
  lastErr = j.error || '';
  S = j; sel = null; render();
}
async function refresh() {
  const r = await fetch('/api/state'); S = await r.json(); render();
}

function cardEl(view, extra) {
  const box = document.createElement('div');
  box.className = 'cardbox';
  if (!view) return box;
  const c = view.card || view;
  if (c.image) {
    const img = document.createElement('img');
    img.className = 'card'; img.src = c.image; img.title = c.name;
    box.appendChild(img);
  } else {
    const d = document.createElement('div');
    d.className = 'card pile'; d.textContent = c.name; box.appendChild(d);
  }
  if (view.damage > 0) { const b = document.createElement('span'); b.className='dmg'; b.textContent = view.damage; box.appendChild(b); }
  if (view.conditions && view.conditions.length) { const b = document.createElement('span'); b.className='cond'; b.textContent = view.conditions.join(','); box.appendChild(b); }
  if (extra) extra(box);
  return box;
}

function pokemonZone(view, label, onclick, selected) {
  const z = document.createElement('div'); z.className = 'zone';
  const box = cardEl(view);
  if (!view) { const p = document.createElement('div'); p.className = 'pile'; p.textContent = '—'; box.appendChild(p); }
  if (onclick) box.onclick = onclick;
  if (selected) box.classList.add('sel');
  z.appendChild(box);
  let sub = label;
  if (view && view.energies) sub += ` · ${view.energies.length}⚡`;
  const l = document.createElement('div'); l.className = 'label'; l.textContent = sub; z.appendChild(l);
  return z;
}

function pile(n, label) {
  const z = document.createElement('div'); z.className = 'zone';
  const p = document.createElement('div'); p.className = 'pile'; p.textContent = n; z.appendChild(p);
  const l = document.createElement('div'); l.className = 'label'; l.textContent = label; z.appendChild(l);
  return z;
}

function renderSide(el, side, isYou) {
  el.innerHTML = `<h3>${isYou ? 'Você' : 'Bot'} — prêmios pegos: ${side.prizesTaken}</h3>`;
  const z = document.createElement('div'); z.className = 'zones';
  z.appendChild(pile(side.deck, 'Deck'));
  z.appendChild(pile(side.prizes, 'Prêmios'));
  if (!isYou) z.appendChild(pile(side.handCount, 'Mão'));
  z.appendChild(pokemonZone(side.active, 'Ativo',
    isYou ? () => select('active', -1) : null,
    isYou && sel && sel.kind==='active'));
  (side.bench || []).forEach((b, i) => {
    z.appendChild(pokemonZone(b, 'Banco ' + (i+1),
      isYou ? () => select('bench', i) : null,
      isYou && sel && sel.kind==='bench' && sel.idx===i));
  });
  const dz = document.createElement('div'); dz.className='zone';
  const last = (side.discard||[]).slice(-1)[0];
  dz.appendChild(last ? cardEl(last) : Object.assign(document.createElement('div'),{className:'pile',textContent:'0'}));
  const dl = document.createElement('div'); dl.className='label'; dl.textContent = `Descarte (${(side.discard||[]).length})`; dz.appendChild(dl);
  z.appendChild(dz);
  el.appendChild(z);
}

function select(kind, idx) {
  sel = (sel && sel.kind===kind && sel.idx===idx) ? null : {kind, idx};
  render();
}

function renderHand() {
  const el = document.getElementById('hand');
  el.innerHTML = '';
  (S.you.hand || []).forEach((c, i) => {
    const box = cardEl(c);
    box.onclick = () => select('hand', i);
    if (sel && sel.kind==='hand' && sel.idx===i) box.classList.add('sel');
    el.appendChild(box);
  });
}

function btn(label, fn, primary) {
  const b = document.createElement('button');
  b.textContent = label; b.onclick = fn;
  if (primary) b.className = 'primary';
  return b;
}

// alvo em jogo escolhido (ou pergunta): -1 ativo, 0.. banco
function chosenSlot() {
  if (sel && sel.kind==='active') return -1;
  if (sel && sel.kind==='bench') return sel.idx;
  const v = prompt('Alvo: -1 = Ativo, 0.. = posição do banco', '-1');
  return v === null ? null : parseInt(v);
}

function renderActions() {
  const el = document.getElementById('actions');
  el.innerHTML = '';
  if (!S) return;
  if (S.winner >= 0 || S.winner === -2) {
    const w = document.createElement('div'); w.className = 'winner';
    w.textContent = S.winner === -2 ? 'Sudden Death!' : (S.winner === 0 ? '🏆 Você venceu!' : '🤖 Bot venceu.');
    el.appendChild(w); return;
  }
  if (S.phase === 'setup') {
    el.appendChild(document.createTextNode('Setup: escolha seu Ativo e Banco (cartas da mão).'));
    if (sel && sel.kind==='hand') {
      if (!S.you.active) el.appendChild(btn('Colocar como Ativo', () => post({action:'place_active', hand:sel.idx}), true));
      else el.appendChild(btn('Colocar no Banco', () => post({action:'place_bench', hand:sel.idx}), true));
    }
    if (S.you.active) el.appendChild(btn('Concluir setup', () => post({action:'finish_setup'})));
    return;
  }
  if (S.needPromote && S.needPromote[0]) {
    el.appendChild(document.createTextNode('Seu Ativo caiu — clique num Pokémon do banco e promova.'));
    if (sel && sel.kind==='bench') el.appendChild(btn('Promover', () => post({action:'promote', bench:sel.idx}), true));
    return;
  }
  if (S.current !== 0) { el.appendChild(document.createTextNode('Turno do bot…')); return; }

  if (sel && sel.kind==='hand') {
    const c = S.you.hand[sel.idx];
    if (c.category === 'Energy') el.appendChild(btn('Ligar Energia', () => { const s2 = chosenSlot(); if (s2!==null) post({action:'attach_energy', hand:sel.idx, slot:s2}); }, true));
    if (c.category === 'Pokemon' && c.stage === 'Basic') el.appendChild(btn('Baixar no Banco', () => post({action:'place_bench', hand:sel.idx}), true));
    if (c.category === 'Pokemon' && c.stage !== 'Basic') el.appendChild(btn('Evoluir', () => { const s2 = chosenSlot(); if (s2!==null) post({action:'evolve', hand:sel.idx, slot:s2}); }, true));
    if (c.trainerType === 'Item') el.appendChild(btn('Jogar Item', () => post({action:'play_item', hand:sel.idx}), true));
    if (c.trainerType === 'Supporter') el.appendChild(btn('Jogar Suporte', () => post({action:'play_supporter', hand:sel.idx}), true));
    if (c.trainerType === 'Stadium') el.appendChild(btn('Jogar Estádio', () => post({action:'play_stadium', hand:sel.idx}), true));
    if (c.trainerType === 'Tool') el.appendChild(btn('Ligar Ferramenta', () => { const s2 = chosenSlot(); if (s2!==null) post({action:'attach_tool', hand:sel.idx, slot:s2}); }, true));
  }
  if (S.you.active) {
    (S.you.active.card.attacks || []).forEach((a, i) => {
      el.appendChild(btn(`⚔ ${a.name} (${a.damage || 'efeito'})`, () => post({action:'attack', attack:i}), true));
    });
    if ((S.you.bench || []).length) el.appendChild(btn('Recuar', () => {
      const b = prompt('Trocar com qual posição do banco? (0..)', '0'); if (b===null) return;
      const cost = S.you.active.card.retreat || 0;
      let en = [];
      if (cost > 0) {
        const e = prompt(`Custo ${cost}: índices das energias a descartar (ex.: 0,1)`, Array.from({length:cost},(_, i)=>i).join(','));
        if (e===null) return; en = e.split(',').filter(x=>x!=='').map(Number);
      }
      post({action:'retreat', bench:parseInt(b), energies:en});
    }));
  }
  el.appendChild(btn('Passar turno', () => post({action:'end_turn'})));
}

function render() {
  if (!S) return;
  renderSide(document.getElementById('botSide'), S.bot, false);
  renderSide(document.getElementById('youSide'), S.you, true);
  renderHand();
  renderActions();
  const st = document.getElementById('status');
  st.innerHTML = `Turno ${S.turn} — ${S.current===0 ? 'sua vez' : 'vez do bot'} · fase: ${S.phase}` +
    (lastErr ? `<span class="err">⚠ ${lastErr}</span>` : '');
  const lg = document.getElementById('log');
  lg.innerHTML = (S.log || []).map(l => `<div>${l}</div>`).join('');
  lg.scrollTop = lg.scrollHeight;
}

function arb(action) {
  post({action, player:parseInt(arbP.value), slot:parseInt(arbSlot.value),
        bench:parseInt(arbSlot.value), amount:parseInt(arbAmt.value)});
}
function arbCondition() {
  post({action:'arb_condition', player:parseInt(arbP.value), condition:arbCond.value});
}

refresh();
</script>
</body>
</html>
