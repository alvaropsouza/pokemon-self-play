# Scripts do projeto (github.com/go-task/task — instalado via
# `go install github.com/go-task/task/v3/cmd/task@latest`).
# Uso: `task` lista tudo; `task play`, `task test`, `task import -- me01`...
version: "3"

# Variáveis locais (ANTHROPIC_API_KEY...) — arquivo git-ignorado, opcional.
dotenv: ['.env']

tasks:
  default:
    desc: Lista as tarefas disponíveis
    cmds:
      - task --list
    silent: true

  play:
    desc: "Partida contra o bot com reload: UI em http://localhost:5173 (Vite HMR) + backend reiniciado ao mudar .go"
    aliases: [dev]
    deps: [web, dev-api]

  dev-api:
    desc: "Backend em watch: recompila e reinicia ao mudar arquivos .go"
    cmds:
      - powershell -ExecutionPolicy Bypass -File scripts/watch-api.ps1

  web-build:
    desc: "Compila o frontend (Vite + React) para web/dist (embutido no binário)"
    dir: web
    # Fingerprint: só recompila se as fontes mudaram desde o último build.
    sources:
      - src/**/*
      - index.html
      - package.json
      - vite.config.*
    generates:
      - dist/**/*
    cmds:
      - npm install
      - npm run build

  web:
    desc: "Frontend em modo dev (Vite, proxy /api -> :8080; já incluso em `task play`)"
    dir: web
    cmds:
      - npm run dev

  import:
    desc: "Importa sets do TCGdex (ex.: task import -- me01 sve)"
    cmds:
      - go run ./cmd/import {{.CLI_ARGS}}

  compile-effects:
    desc: "Atualiza data/effects.json: lista efeitos pendentes; com ANTHROPIC_API_KEY, compila via Claude"
    cmds:
      - go run ./cmd/compile-effects {{.CLI_ARGS}}

  triage:
    desc: "Triagem de efeitos pendentes em SQLite (task triage -- export); banco em data/triage.db"
    cmds:
      - go run ./cmd/effects-triage {{.CLI_ARGS | default "scan"}}

  build:
    desc: Compila tudo
    cmds:
      - go build ./...

  test:
    desc: Roda todos os testes
    cmds:
      - go test -count=1 ./...

  check:
    desc: Build + vet + testes (rodar antes de commitar)
    cmds:
      - go build ./...
      - go vet ./...
      - go test -count=1 ./...
